      头文件：xc_drv_aotimer.h

  - id: adc_mic
    priority: 65
    keywords: ["adc", "mic", "pga", "麦克风"]
    reply: |
      ADC + MIC PGA 示例：
      project/example/driver/adc_mic_pga/app/src/pga_adc.c

  - id: more_data
    priority: 60
    keywords: ["more_data", "more data", "MD位"]
    reply: |
      more_data 在 SDK 里有多处含义，需看上下文：
      1) 扩展广播 Data Status 位
      2) 连接层 MD（More Data）位
      3) GATT 长读/分包时的 more data 标志
      请说明是广播、连接还是 GATT 场景。

  - id: local_fast_reply
    priority: 50
    keywords: ["太慢", "好慢", "加速", "秒回"]
    reply: |
      加速方法：
      1) 常见问题直接问关键词（已内置关键词库）
      2) 命中关键词库或本地资料时优先走本地检索
      3) 把常用问答加到 keyword_library.yaml
      4) 笔记放 reference/documents/ 供本地检索
